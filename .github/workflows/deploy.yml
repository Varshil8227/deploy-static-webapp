name: Production Deploy Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        # We tell GitHub to look inside project-1/code for the Dockerfile
        run: docker build -t portfolio-app ./code

      - name: Save Private Key
        run: |
          echo "${{ secrets.EC2_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Copy Project Files to EC2
        run: |
          scp -o StrictHostKeyChecking=no -i private_key.pem -r . \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/${{ secrets.EC2_USER }}/portfolio

      - name: Deploy on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i private_key.pem \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            # 1. Find and enter the correct folder
            # Note: We use -d to check if the directory exists first
            cd ~/portfolio/project-1/code || cd ~/portfolio/*/project-1/code

            # 2. Use sudo for docker if you haven't fixed permissions yet
            sudo docker stop portfolio-container || true
            sudo docker rm portfolio-container || true

            # 3. Build and Run
            sudo docker build -t portfolio-app .
            sudo docker run -d \
              --name portfolio-container \
              -p 80:80 \
              --restart always \
              portfolio-app
          EOF