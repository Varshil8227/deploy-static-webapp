name: Production Deploy Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        # Fixed path: Dockerfile is inside project-1/code/
        run: docker build -t portfolio-app ./project-1/code

      - name: Save Private Key
        run: |
          echo "${{ secrets.EC2_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Copy Project Files to EC2
        run: |
          # Create the target directory first (avoids stale permission issues)
          ssh -o StrictHostKeyChecking=no -i private_key.pem \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "rm -rf ~/portfolio && mkdir -p ~/portfolio"

          # Copy ONLY project-1/code — skip .git entirely
          scp -o StrictHostKeyChecking=no -i private_key.pem -r \
            ./project-1/code \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/portfolio/

      - name: Deploy on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i private_key.pem \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            cd ~/portfolio/code

            sudo docker stop portfolio-container || true
            sudo docker rm portfolio-container || true

            sudo docker build -t portfolio-app .
            sudo docker run -d \
              --name portfolio-container \
              -p 80:80 \
              --restart always \
              portfolio-app
          EOF